name: devops-technical-assessment

services:
  site1:
    image: devops-assessment-site1:local
    build:
      context: ./site1
    init: true
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:size=16m,mode=1777
    expose:
      - "8080"
    networks:
      - web

  site2:
    image: devops-assessment-site2:local
    build:
      context: ./site2
    init: true
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:size=16m,mode=1777
    expose:
      - "8080"
    networks:
      - web

  reverse-proxy:
    image: devops-assessment-proxy:local
    build:
      context: ./nginx
    init: true
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:size=16m,mode=1777
    depends_on:
      site1:
        condition: service_healthy
      site2:
        condition: service_healthy
    ports:
      - "${PUBLIC_PORT:-8080}:8080"
    networks:
      - web

networks:
  web:
    driver: bridge
