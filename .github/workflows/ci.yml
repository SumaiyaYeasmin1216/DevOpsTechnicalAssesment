name: CI

on:
  push:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Source quality and dependency audit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24
          cache: npm

      - name: Install quality tooling
        run: npm ci

      - name: Run repository checks
        run: npm run check

      - name: Audit locked dependencies
        run: npm audit --audit-level=high

  container-integration:
    name: Container integration
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PUBLIC_PORT: 8080

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24

      - name: Validate Docker Compose configuration
        run: docker compose config --quiet

      - name: Build application images
        run: docker compose build --pull

      - name: Start application stack
        run: docker compose up --detach --wait --wait-timeout 120

      - name: Validate Nginx configurations
        shell: bash
        run: |
          set -euo pipefail
          for service in site1 site2 reverse-proxy; do
            docker compose exec -T "$service" nginx -t
          done

      - name: Verify container security and port isolation
        shell: bash
        run: |
          set -euo pipefail
          for service in site1 site2 reverse-proxy; do
            test "$(docker compose exec -T "$service" id -u)" != "0"
          done

          for service in site1 site2; do
            container_id="$(docker compose ps --quiet "$service")"
            bindings="$(docker inspect --format '{{json .HostConfig.PortBindings}}' "$container_id")"
            test "$bindings" = "{}"
          done

          proxy_id="$(docker compose ps --quiet reverse-proxy)"
          proxy_bindings="$(docker inspect --format '{{json .HostConfig.PortBindings}}' "$proxy_id")"
          test "$proxy_bindings" != "{}"

      - name: Run HTTP smoke tests
        env:
          BASE_URL: http://127.0.0.1:8080
        run: npm run test:smoke

      - name: Print service logs after failure
        if: failure()
        run: docker compose logs --no-color

      - name: Stop application stack
        if: always()
        run: docker compose down --volumes --remove-orphans
